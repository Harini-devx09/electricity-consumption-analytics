<!DOCTYPE html>
<html>

<head>
<title>Electricity Consumption Forecast</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="main-container">

    <div class="form-box">

        <h2>Electricity Consumption Forecast</h2>

        <form action="/predict" method="post">

            <label>Select Year (Available Data)</label>

            <select name="year" required>

            <option value="2019">2019</option>
            <option value="2020">2020</option>

            </select>


            <label>Select Month</label>
            <select name="month" required>
                <option value="1">January</option>
                <option value="2">February</option>
                <option value="3">March</option>
                <option value="4">April</option>
                <option value="5">May</option>
                <option value="6">June</option>
                <option value="7">July</option>
                <option value="8">August</option>
                <option value="9">September</option>
                <option value="10">October</option>
                <option value="11">November</option>
                <option value="12">December</option>
            </select>

            <label>Enter State</label>
            <input type="text" name="state">

            <label>Select Region</label>
            <select name="region" required>
                <option value="">-- Select Region --</option>
                <option value="ER">ER</option>
                <option value="NR">NR</option>
                <option value="SR">SR</option>
                <option value="WR">WR</option>
                <option value="NER">NER</option>
            </select>

            <label>Latitude</label>
            <input type="number" step="any" name="latitude" placeholder="Enter latitude (optional)">

            <label>Longitude</label>
            <input type="number" step="any" name="longitude" placeholder="Enter longitude (optional)">

            <button type="submit">Predict Consumption</button>

        </form>

    </div>

</div>

</body>
</html>
